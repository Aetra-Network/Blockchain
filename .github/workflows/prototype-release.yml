name: Prototype Release Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Prototype version, for example prototype-v0.1.0-rc.1"
        required: false
        default: ""
      run_e2e:
        description: "Run 3-validator prototype acceptance smoke"
        required: true
        type: boolean
        default: true
      create_release:
        description: "Create a GitHub prerelease"
        required: true
        type: boolean
        default: false

permissions:
  # Least-privilege default: only the `prerelease` job needs to write, and
  # only that job declares `contents: write` (see FINDING-018c). This
  # workflow does not upload SARIF or otherwise touch the code-scanning API,
  # so `security-events: write` was unused here and has been dropped rather
  # than relocated.
  contents: read

env:
  BUF_VERSION: "1.70.0"

jobs:
  checks:
    name: Checks And Audit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate release inputs
        shell: pwsh
        run: |
          if ("${{ inputs.create_release }}" -eq "true" -and [string]::IsNullOrWhiteSpace("${{ inputs.version }}")) {
            throw "version is required when create_release=true"
          }

      - name: Install tools
        shell: pwsh
        # Tool versions are pinned (not @latest) so CI is reproducible and an
        # upstream compromise or malicious release can't execute in this
        # runner unreviewed (see FINDING-018b). Bump deliberately on periodic
        # review; keep in sync with .github/workflows/security.yml.
        run: |
          go install github.com/zricethezav/gitleaks/v8@v8.28.0
          go install github.com/securego/gosec/v2/cmd/gosec@v2.28.0
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          .\scripts\tooling\ensure-buf.ps1 -Version $env:BUF_VERSION | Out-Null
          "$PWD\.work\tools\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Resolve gitleaks config
        shell: pwsh
        run: |
          $ConfigRef = "${{ github.event.repository.default_branch }}"
          git fetch --no-tags --depth=1 origin $ConfigRef
          $GitleaksConfig = Join-Path $env:RUNNER_TEMP 'gitleaks.toml'
          git show "origin/$ConfigRef:.gitleaks.toml" | Set-Content -LiteralPath $GitleaksConfig
          "GITLEAKS_CONFIG=$GitleaksConfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Unit tests
        shell: pwsh
        run: go test -p=1 ./...

      - name: Vet
        shell: pwsh
        run: go vet -p=1 ./...

      - name: Buf lint
        shell: pwsh
        run: buf lint

      - name: Gitleaks
        shell: pwsh
        run: |
          $Gitleaks = Join-Path (go env GOPATH) 'bin\gitleaks.exe'
          & $Gitleaks git --config $env:GITLEAKS_CONFIG --no-banner --redact --log-opts=--all .

      - name: Prototype audit gate
        shell: pwsh
        run: .\scripts\security\prototype-audit.ps1 -Profile Full -Strict -SkipTests -GitleaksConfig $env:GITLEAKS_CONFIG

      - name: Upload audit evidence
        uses: actions/upload-artifact@v4
        with:
          name: prototype-audit-evidence
          path: .work/security/prototype-audit-*/**

  acceptance:
    name: Acceptance Smoke
    if: ${{ inputs.run_e2e }}
    runs-on: windows-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run prototype acceptance smoke
        shell: pwsh
        run: |
          $duration = Measure-Command {
            .\tests\e2e\prototype_acceptance.ps1 -Profile Smoke
          }
          "### CI Timing Summary" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "| Check | Duration seconds |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "| --- | ---: |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "| prototype acceptance smoke | $([Math]::Round($duration.TotalSeconds, 2)) |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prototype-acceptance-diagnostics
          path: .work/diagnostics/**

  package:
    name: Package ${{ matrix.target_os }}-${{ matrix.target_arch }}
    runs-on: ${{ matrix.runner }}
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target_os: windows
            target_arch: amd64
          - runner: ubuntu-latest
            target_os: linux
            target_arch: amd64
          - runner: ubuntu-latest
            target_os: linux
            target_arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build package
        shell: pwsh
        run: |
          ./scripts/release/prototype-package.ps1 `
            -Version "${{ inputs.version }}" `
            -TargetOS "${{ matrix.target_os }}" `
            -TargetArch "${{ matrix.target_arch }}"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: aetra-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: dist/prototype/**

  prerelease:
    name: GitHub Prerelease
    if: ${{ always() && inputs.create_release && needs.checks.result == 'success' && needs.package.result == 'success' && (!inputs.run_e2e || needs.acceptance.result == 'success') }}
    runs-on: ubuntu-latest
    # Only this job creates a release, so only this job gets contents: write
    # (see FINDING-018c). checks/acceptance/package inherit the workflow's
    # read-only default.
    permissions:
      contents: write
    needs:
      - checks
      - acceptance
      - package
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create prerelease
        # SHA-pinned third-party action (mutable tag = supply-chain risk in a
        # contents: write job, see FINDING-018c). SHA resolved from the `v2`
        # tag on 2026-07-14; at that time `v2` pointed to release v2.6.2
        # (upstream has since moved a `v3` major tag, out of scope here --
        # this pin intentionally preserves current v2.x behavior).
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2 (v2.6.2)
        with:
          tag_name: ${{ inputs.version }}
          name: Aetra ${{ inputs.version }}
          prerelease: true
          generate_release_notes: true
          files: release-artifacts/**/*

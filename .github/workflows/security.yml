name: Security Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read
  pull-requests: read
  actions: read
  security-events: write

env:
  # -tags purego,noadx: force gnark-crypto (AVM Phase D BN254 opcodes) onto its
  # pure-Go arithmetic path, closing the ADX-dispatch cross-arch/runtime-CPU-
  # feature determinism hazard -- see docs/architecture/avm-phase-d-zk-design.md
  # (Status). Applies to every go build/test invocation below via GOFLAGS. This
  # matters MOST for the determinism-gate job just below: its whole purpose is
  # proving the runtime keeps stable state roots, which is meaningless if the
  # crypto opcodes under test aren't pinned to a deterministic backend.
  GOFLAGS: "-p=1 -tags=purego,noadx"

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        # Pinned (not @latest) so CI is reproducible and an upstream compromise
        # or malicious release can't execute in this runner unreviewed (see
        # FINDING-018b). Bump deliberately on periodic review.
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0

      - name: Run govulncheck
        shell: bash
        run: |
          set -euo pipefail

          triage_file=".github/security/govulncheck-triage.txt"
          triage_source="${triage_file}"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            # Read the allowlist from the protected base branch, not the PR tree.
            git fetch --no-tags --depth=1 origin "${GITHUB_BASE_REF}"
            triage_source="$(mktemp)"
            git show "origin/${GITHUB_BASE_REF}:${triage_file}" > "${triage_source}"
            trap 'rm -f "${triage_source}"' EXIT
          fi

          set +e
          govulncheck ./... 2>&1 | tee govulncheck.txt
          govuln_status=${PIPESTATUS[0]}
          set -e

          if [[ "${govuln_status}" -eq 0 ]]; then
            exit 0
          fi

          mapfile -t findings < <(grep -E '^Vulnerability #[0-9]+: GO-[0-9]+-[0-9]+' govulncheck.txt | awk '{print $3}' | sort -u)

          if [[ "${#findings[@]}" -eq 0 ]]; then
            printf 'govulncheck failed without parseable GO advisory IDs.\n'
            exit "${govuln_status}"
          fi

          # A finding is only suppressed when its triage entry (a) exists, (b)
          # declares a recognized status, and (c) is not past its expires=
          # re-review date. Matching by bare ID alone would let one old triage
          # decision suppress a finding forever regardless of whether it is
          # still accurate (see FINDING-018a); requiring status+expiry makes
          # suppression a deliberate, time-boxed decision instead of a
          # permanent one.
          today="$(date -u +%Y-%m-%d)"
          untriaged=()
          expired=()
          for finding in "${findings[@]}"; do
            entry="$(grep -E "^${finding}[[:space:]]" "${triage_source}" | head -n1 || true)"

            if [[ -z "${entry}" ]]; then
              untriaged+=("${finding} (no triage entry)")
              continue
            fi

            status="$(printf '%s\n' "${entry}" | grep -oE 'status=[A-Za-z-]+' | head -n1 | cut -d= -f2 || true)"
            case "${status}" in
              fixed|accepted|triaged|false-positive) ;;
              *)
                untriaged+=("${finding} (triage entry missing or has unrecognized status=)")
                continue
                ;;
            esac

            expires="$(printf '%s\n' "${entry}" | grep -oE 'expires=[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -n1 | cut -d= -f2 || true)"
            if [[ -z "${expires}" ]]; then
              untriaged+=("${finding} (triage entry missing expires=YYYY-MM-DD)")
              continue
            fi

            if [[ "${expires}" < "${today}" ]]; then
              expired+=("${finding} (status=${status}, expired ${expires})")
            fi
          done

          if [[ "${#untriaged[@]}" -gt 0 || "${#expired[@]}" -gt 0 ]]; then
            if [[ "${#untriaged[@]}" -gt 0 ]]; then
              printf 'Untriaged govulncheck findings:\n'
              printf '  %s\n' "${untriaged[@]}"
            fi
            if [[ "${#expired[@]}" -gt 0 ]]; then
              printf 'Expired govulncheck triage entries -- re-review reachability/status and bump expires= in %s:\n' "${triage_file}"
              printf '  %s\n' "${expired[@]}"
            fi
            exit 1
          fi

          printf 'govulncheck reported only triaged, non-expired findings:\n'
          printf '  %s\n' "${findings[@]}"

  determinism-gate:
    name: AVM determinism gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run determinism gate
        shell: bash
        run: |
          set -euo pipefail
          # Executable gate: scans the consensus-critical AVM/contracts source
          # for forbidden non-determinism (wall-clock, process randomness,
          # goroutines, map iteration, floats, network/env access) and proves
          # the runtime keeps stable state roots. This runs on every PR and on
          # pushes to main so nondeterminism cannot merge.
          go test ./tests/avm_determinism_gate/... -count=1
          go test ./app -run 'TestAVMRuntimeDeterminismGateRejectsNondeterminismAndKeepsStableRoots|TestConsensusCriticalSourceRejectsNondeterminismAndExternalNetworkCalls' -count=1

  gosec:
    name: gosec high severity
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gosec
        # Pinned (not @latest) so CI is reproducible and an upstream compromise
        # or malicious release can't execute in this runner unreviewed (see
        # FINDING-018b). Bump deliberately on periodic review.
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.28.0

      - name: Run gosec
        run: |
          mapfile -t package_dirs < <(go list -f '{{.Dir}}' ./...)
          set +e
          # G115 is tracked separately from this high-signal security gate because
          # the repository currently has many intentional bounded/canonical casts.
          gosec -exclude-generated -exclude G115 -severity high -confidence medium -fmt sarif -out gosec.sarif "${package_dirs[@]}"
          gosec_status=$?
          set -e

          if [[ "${gosec_status}" -ne 0 ]]; then
            gosec -exclude-generated -exclude G115 -severity high -confidence medium -fmt json -out gosec.json "${package_dirs[@]}" || true
            python3 - <<'PY'
          import json

          with open("gosec.json", encoding="utf-8") as report:
              data = json.load(report)

          for issue in data.get("Issues", []):
              print(
                  "gosec finding: "
                  f"{issue.get('rule_id')} "
                  f"{issue.get('file')}:{issue.get('line')}:{issue.get('column')} "
                  f"{issue.get('details')}"
              )
          PY
          fi

          exit "${gosec_status}"

      - name: Upload gosec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gosec.sarif

  gitleaks:
    name: gitleaks secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.28.0

      - name: Run gitleaks
        run: |
          set -euo pipefail

          config_ref="${{ github.event.repository.default_branch }}"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            config_ref="${GITHUB_BASE_REF}"
          fi

          git fetch --no-tags --depth=1 origin "${config_ref}"
          gitleaks_config="$(mktemp)"
          git show "origin/${config_ref}:.gitleaks.toml" > "${gitleaks_config}"
          trap 'rm -f "${gitleaks_config}"' EXIT

          GITLEAKS_BIN="$(go env GOPATH)/bin/gitleaks"
          "${GITLEAKS_BIN}" git --config "${gitleaks_config}" --no-banner --redact --log-opts=--all .

  dependency-review:
    name: dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4

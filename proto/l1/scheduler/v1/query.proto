syntax = "proto3";
package l1.scheduler.v1;

import "google/api/annotations.proto";
import "gogoproto/gogo.proto";
import "l1/scheduler/v1/genesis.proto";

option go_package = "github.com/sovereign-l1/l1/api/l1/scheduler/v1;schedulerv1";

service Query {
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/l1/scheduler/v1/params";
  }

  rpc ScheduledJob(QueryScheduledJobRequest) returns (QueryScheduledJobResponse) {
    option (google.api.http).get = "/l1/scheduler/v1/jobs/{owner_module}/{job_id}";
  }

  rpc ScheduledJobs(QueryScheduledJobsRequest) returns (QueryScheduledJobsResponse) {
    option (google.api.http).get = "/l1/scheduler/v1/jobs";
  }

  rpc DueJobs(QueryDueJobsRequest) returns (QueryDueJobsResponse) {
    option (google.api.http).get = "/l1/scheduler/v1/jobs/due/{due_height}";
  }

  rpc JobHistory(QueryJobHistoryRequest) returns (QueryJobHistoryResponse) {
    option (google.api.http).get = "/l1/scheduler/v1/jobs/{job_id}/history";
  }
}

message QueryParamsRequest {}

message QueryParamsResponse {
  Params params = 1 [(gogoproto.nullable) = false];
  SchedulerParams scheduler_params = 2 [(gogoproto.nullable) = false];
}

message QueryScheduledJobRequest {
  string owner_module = 1;
  string job_id = 2;
}

message QueryScheduledJobResponse {
  ScheduledJob job = 1 [(gogoproto.nullable) = false];
}

message QueryScheduledJobsRequest {
  uint64 offset = 1;
  uint64 limit = 2;
}

message QueryScheduledJobsResponse {
  repeated ScheduledJob jobs = 1 [(gogoproto.nullable) = false];
  uint64 next_offset = 2;
}

message QueryDueJobsRequest {
  uint64 due_height = 1;
  uint64 offset = 2;
  uint64 limit = 3;
}

message QueryDueJobsResponse {
  repeated ScheduledJob jobs = 1 [(gogoproto.nullable) = false];
  uint64 next_offset = 2;
}

message QueryJobHistoryRequest {
  string job_id = 1;
  uint64 offset = 2;
  uint64 limit = 3;
}

message QueryJobHistoryResponse {
  repeated JobHistoryRecord history = 1 [(gogoproto.nullable) = false];
  uint64 next_offset = 2;
}
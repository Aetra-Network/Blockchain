syntax = "proto3";

package l1.systemregistry.v1;

import "cosmos/msg/v1/msg.proto";
import "gogoproto/gogo.proto";
import "l1/systemregistry/v1/genesis.proto";

option go_package = "github.com/sovereign-l1/l1/api/l1/systemregistry/v1;systemregistryv1";

service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc RegisterSystemEntity(MsgRegisterSystemEntity) returns (MsgRegisterSystemEntityResponse);
  rpc UpdateSystemEntity(MsgUpdateSystemEntity) returns (MsgUpdateSystemEntityResponse);
  rpc PauseSystemEntity(MsgPauseSystemEntity) returns (MsgPauseSystemEntityResponse);
  rpc ResumeSystemEntity(MsgResumeSystemEntity) returns (MsgResumeSystemEntityResponse);
  rpc DeprecateSystemEntity(MsgDeprecateSystemEntity) returns (MsgDeprecateSystemEntityResponse);
}

message MsgRegisterSystemEntity {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  SystemEntity entity = 2 [(gogoproto.nullable) = false];
}

message MsgRegisterSystemEntityResponse {
  SystemEntity entity = 1 [(gogoproto.nullable) = false];
}

message MsgUpdateSystemEntity {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  SystemEntity entity = 2 [(gogoproto.nullable) = false];
}

message MsgUpdateSystemEntityResponse {
  SystemEntity entity = 1 [(gogoproto.nullable) = false];
}

message MsgPauseSystemEntity {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  string module_name = 2;
  uint64 height = 3;
  bool allow_privileged_calls_while_paused = 4;
}

message MsgPauseSystemEntityResponse {
  SystemEntity entity = 1 [(gogoproto.nullable) = false];
}

message MsgResumeSystemEntity {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  string module_name = 2;
  uint64 height = 3;
}

message MsgResumeSystemEntityResponse {
  SystemEntity entity = 1 [(gogoproto.nullable) = false];
}

message MsgDeprecateSystemEntity {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  string module_name = 2;
  uint64 height = 3;
}

message MsgDeprecateSystemEntityResponse {
  SystemEntity entity = 1 [(gogoproto.nullable) = false];
}

syntax = "proto3";

package l1.systemregistry.v1;

import "google/api/annotations.proto";
import "l1/systemregistry/v1/genesis.proto";

option go_package = "github.com/sovereign-l1/l1/api/l1/systemregistry/v1;systemregistryv1";

service Query {
  rpc SystemEntity(QuerySystemEntityRequest) returns (QuerySystemEntityResponse) {
    option (google.api.http).get = "/l1/systemregistry/v1/entity/{module_name}";
  }
  rpc SystemEntities(QuerySystemEntitiesRequest) returns (QuerySystemEntitiesResponse) {
    option (google.api.http).get = "/l1/systemregistry/v1/entities";
  }
  rpc ModuleAccount(QueryModuleAccountRequest) returns (QueryModuleAccountResponse) {
    option (google.api.http).get = "/l1/systemregistry/v1/module_account/{module_name}";
  }
  rpc Capabilities(QueryCapabilitiesRequest) returns (QueryCapabilitiesResponse) {
    option (google.api.http).get = "/l1/systemregistry/v1/capabilities/{module_name}";
  }
  rpc DependencyGraph(QueryDependencyGraphRequest) returns (QueryDependencyGraphResponse) {
    option (google.api.http).get = "/l1/systemregistry/v1/dependency_graph";
  }
}

message QuerySystemEntityRequest {
  string module_name = 1;
}

message QuerySystemEntityResponse {
  SystemEntity entity = 1;
}

message QuerySystemEntitiesRequest {}

message QuerySystemEntitiesResponse {
  repeated SystemEntity entities = 1;
}

message QueryModuleAccountRequest {
  string module_name = 1;
}

message QueryModuleAccountResponse {
  string module_account_address = 1;
}

message QueryCapabilitiesRequest {
  string module_name = 1;
}

message QueryCapabilitiesResponse {
  repeated string capabilities = 1;
}

message QueryDependencyGraphRequest {}

message DependencyEdge {
  string module_name = 1;
  string depends_on = 2;
}

message QueryDependencyGraphResponse {
  repeated DependencyEdge edges = 1;
}

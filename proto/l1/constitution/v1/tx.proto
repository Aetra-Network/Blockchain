syntax = "proto3";
package l1.constitution.v1;

import "cosmos/msg/v1/msg.proto";
import "gogoproto/gogo.proto";
import "l1/constitution/v1/genesis.proto";

option go_package = "github.com/sovereign-l1/l1/api/l1/constitution/v1;constitutionv1";

service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc ProposeConstitutionAmendment(MsgProposeConstitutionAmendment) returns (MsgProposeConstitutionAmendmentResponse);
  rpc VoteConstitutionAmendment(MsgVoteConstitutionAmendment) returns (MsgVoteConstitutionAmendmentResponse);
  rpc ExecuteConstitutionAmendment(MsgExecuteConstitutionAmendment) returns (MsgExecuteConstitutionAmendmentResponse);
  rpc CancelConstitutionAmendment(MsgCancelConstitutionAmendment) returns (MsgCancelConstitutionAmendmentResponse);
}

message MsgProposeConstitutionAmendment {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  Amendment amendment = 2 [(gogoproto.nullable) = false];
}

message MsgProposeConstitutionAmendmentResponse {
  Amendment amendment = 1 [(gogoproto.nullable) = false];
}

message MsgVoteConstitutionAmendment {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  string amendment_id = 2;
  string support = 3;
  uint32 voting_power_bps = 4;
}

message MsgVoteConstitutionAmendmentResponse {
  Amendment amendment = 1 [(gogoproto.nullable) = false];
}

message MsgExecuteConstitutionAmendment {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  string amendment_id = 2;
}

message MsgExecuteConstitutionAmendmentResponse {
  Constitution constitution = 1 [(gogoproto.nullable) = false];
  Amendment amendment = 2 [(gogoproto.nullable) = false];
}

message MsgCancelConstitutionAmendment {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  string amendment_id = 2;
  string reason = 3;
}

message MsgCancelConstitutionAmendmentResponse {
  Amendment amendment = 1 [(gogoproto.nullable) = false];
}
